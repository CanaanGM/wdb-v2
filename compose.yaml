services:
  database:
    container_name: workout_db
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - workoutlog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U workoutlog -d workoutlog" ]
      interval: 5s
      timeout: 3s
      retries: 10

  migrator:
    image: workoutlog.migrator
    pull_policy: never
    build:
      context: .
      dockerfile: Infrastructure/Dockerfile.migrator
    profiles:
      - migrations
    depends_on:
      database:
        condition: service_healthy
    environment:
      WORKOUTLOG_DB_CONNECTION: "Host=database;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    command:
      - database
      - update
      - --project
      - Infrastructure/Infrastructure.csproj
      - --startup-project
      - Api/Api.csproj

  migrator-down:
    image: workoutlog.migrator
    pull_policy: never
    build:
      context: .
      dockerfile: Infrastructure/Dockerfile.migrator
    profiles:
      - migrations
    depends_on:
      database:
        condition: service_healthy
    environment:
      WORKOUTLOG_DB_CONNECTION: "Host=database;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    command:
      - database
      - update
      - "0"
      - --project
      - Infrastructure/Infrastructure.csproj
      - --startup-project
      - Api/Api.csproj

  api:
    container_name: workout_api
    image: workoutlog.api
    build:
      context: .
      dockerfile: Api/Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "https://+:443;http://+:80"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/workoutlog.pfx"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "${HTTPS_CERT_PASSWORD}"
      ConnectionStrings__WorkoutLogDatabase: "Host=database;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Auth__Jwt__Issuer: "${AUTH_JWT_ISSUER}"
      Auth__Jwt__Audience: "${AUTH_JWT_AUDIENCE}"
      Auth__Jwt__Secret: "${AUTH_JWT_SECRET}"
      Auth__Jwt__AccessTokenMinutes: "${AUTH_JWT_ACCESS_TOKEN_MINUTES}"
      Auth__RefreshToken__CookieName: "${AUTH_REFRESH_COOKIE_NAME}"
      Auth__RefreshToken__RefreshTokenDays: "${AUTH_REFRESH_DAYS}"
      Auth__RefreshToken__CookiePath: "${AUTH_REFRESH_COOKIE_PATH}"
      Auth__PasswordReset__IncludeDebugResetToken: "${AUTH_PASSWORD_RESET_INCLUDE_DEBUG_TOKEN}"
      Auth__BootstrapAdmin__Enabled: "${AUTH_BOOTSTRAP_ADMIN_ENABLED}"
      Auth__BootstrapAdmin__Email: "${AUTH_BOOTSTRAP_ADMIN_EMAIL}"
      Auth__BootstrapAdmin__Username: "${AUTH_BOOTSTRAP_ADMIN_USERNAME}"
      Auth__BootstrapAdmin__Password: "${AUTH_BOOTSTRAP_ADMIN_PASSWORD}"
      UserExerciseStats__Maintenance__RecomputeAllOnStartup: "${USER_EXERCISE_STATS_MAINTENANCE_RECOMPUTE_ALL_ON_STARTUP}"
    ports:
      - "${API_HTTP_PORT:-8080}:80"
      - "${API_HTTPS_PORT:-8081}:443"
    volumes:
      - type: bind
        source: "${HTTPS_CERT_DIRECTORY:-${HOME:-${USERPROFILE}}/.aspnet/https}"
        target: /https
        read_only: true

volumes:
  workoutlog_postgres_data:
